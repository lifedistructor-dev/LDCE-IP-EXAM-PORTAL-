<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Chapter 10 · Trial Balance — Visual Study Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --paper:#F2F0E8;
  --paper-2:#E8E4D6;
  --ink:#1B2140;
  --ink-soft:#565E77;
  --rule:#C9C3AD;
  --debit:#2A5DAA;
  --debit-bg:#E2EBF7;
  --credit:#C1701F;
  --credit-bg:#F7E9D8;
  --balance:#276E5C;
  --balance-bg:#DFF0EA;
  --card:#FFFDF8;
  --shadow: 0 2px 0 rgba(27,33,64,.08), 0 8px 24px -12px rgba(27,33,64,.26);
  --radius: 14px;
}
[data-theme="dark"]{
  --paper:#12141F;
  --paper-2:#191C2B;
  --ink:#E9E7DD;
  --ink-soft:#AEB2C4;
  --rule:#353A52;
  --debit:#7FAEF0;
  --debit-bg:#1B2C48;
  --credit:#EFB06A;
  --credit-bg:#3B2C14;
  --balance:#6ADAB9;
  --balance-bg:#123028;
  --card:#191C2C;
  --shadow: 0 2px 0 rgba(0,0,0,.35), 0 10px 28px -12px rgba(0,0,0,.65);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background-color:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  padding-bottom:80px;
  transition:background-color .3s, color .3s;
}
.grid-bg{
  background-image: repeating-linear-gradient(to bottom, transparent, transparent 27px, var(--rule) 28px);
  opacity:.28;
  position:fixed; inset:0; pointer-events:none; z-index:0;
}

header.hero{
  position:relative;
  padding:30px 18px 24px;
  background:
    radial-gradient(120% 140% at 100% 0%, rgba(39,110,92,.16), transparent 55%),
    var(--paper-2);
  border-bottom:3px double var(--rule);
  overflow:hidden;
}
.scale-icon{ position:absolute; top:16px; right:16px; width:70px; height:70px; opacity:.5; color:var(--balance);}
.eyebrow{
  display:inline-flex; align-items:center; gap:6px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--balance); font-weight:600;
  background:var(--balance-bg); padding:4px 10px; border-radius:20px;
  border:1px solid var(--balance);
}
h1.title{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:clamp(26px,7.5vw,40px);
  line-height:1.05;
  margin:10px 0 6px;
  letter-spacing:-.01em;
  max-width:75%;
}
h1.title em{ color:var(--balance); font-style:normal; border-bottom:4px solid var(--balance); }
.hero-sub{ color:var(--ink-soft); font-size:14px; max-width:520px; line-height:1.5; margin:0 0 16px;}
.hero-row{ display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none;}
.hero-row::-webkit-scrollbar{display:none;}
.stat-chip{
  flex:0 0 auto;
  background:var(--card); border:1px solid var(--rule); border-radius:12px;
  padding:10px 14px; box-shadow:var(--shadow); min-width:88px; text-align:center;
}
.stat-chip .num{ font-family:'Fraunces',serif; font-size:20px; font-weight:700; color:var(--ink);}
.stat-chip .lbl{ font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); font-weight:600;}

.toolbar{
  position:sticky; top:0; z-index:20;
  display:flex; gap:8px; padding:10px 14px;
  background:color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--rule);
}
.tbtn{
  border:1px solid var(--rule); background:var(--card); color:var(--ink);
  font-family:'Inter'; font-weight:600; font-size:12.5px;
  padding:8px 12px; border-radius:20px; cursor:pointer; display:flex; align-items:center; gap:6px;
}
.tbtn.active{ background:var(--ink); color:var(--paper); border-color:var(--ink);}
.tbtn:active{ transform:scale(.97); }
.spacer{flex:1;}

main{ max-width:760px; margin:0 auto; padding:14px 12px 40px; position:relative; z-index:1;}

.qcard{
  background:var(--card);
  border:1px solid var(--rule);
  border-radius:var(--radius);
  margin-bottom:12px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.qhead{
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; cursor:pointer; user-select:none;
}
.qnum{
  font-family:'Fraunces',serif; font-weight:700; font-size:17px;
  width:36px; height:36px; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  background:var(--ink); color:var(--paper); flex:0 0 auto;
}
.qhead .qtitle{ flex:1; min-width:0;}
.qhead .qtitle .qlabel{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--balance); font-weight:700;}
.qhead .qtitle .qsum{ font-size:13.8px; font-weight:600; color:var(--ink); line-height:1.35; margin-top:2px;}
.chev{ transition:transform .25s; color:var(--ink-soft); flex:0 0 auto;}
.qcard.open .chev{ transform:rotate(180deg);}
.qbody{ max-height:0; overflow:hidden; transition:max-height .35s ease;}
.qbody-inner{ padding:0 15px 16px; border-top:1px dashed var(--rule); }

.given-box{
  background:var(--paper-2); border-radius:10px; padding:11px 13px; margin:13px 0;
  font-size:13px; line-height:1.55; color:var(--ink-soft);
  border-left:4px solid var(--balance);
}
.given-box b{ color:var(--ink); }
.given-tx{ list-style:none; margin:8px 0 0; padding:0; }
.given-tx li{ display:flex; justify-content:space-between; gap:10px; padding:4px 0; border-bottom:1px dotted var(--rule); font-family:'IBM Plex Mono',monospace; font-size:11.5px;}
.given-tx li:last-child{border-bottom:none;}
.given-tx .amt{ color:var(--ink); font-weight:700; white-space:nowrap;}

.sec-label{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em;
  color:var(--balance); font-weight:700; margin:16px 0 6px; display:flex; align-items:center; gap:6px;
}
.sec-label svg{ width:14px; height:14px; }
.sec-sub{ font-size:11.5px; color:var(--ink-soft); margin:-2px 0 8px; font-style:italic;}

.subtabs{ display:flex; gap:6px; margin:14px 0 10px; flex-wrap:wrap;}
.stbtn{
  border:1px solid var(--rule); background:transparent; color:var(--ink-soft);
  font-size:12px; font-weight:700; padding:6px 12px; border-radius:8px; cursor:pointer;
  font-family:'Inter';
}
.stbtn.active{ background:var(--balance); border-color:var(--balance); color:#fff;}
.pane{ display:none; }
.pane.active{ display:block; }

/* Trial Balance table (S.No format) */
.tb-table{ width:100%; border-collapse:collapse; font-size:12.3px; margin-bottom:6px;}
.tb-table th{
  text-align:left; font-family:'IBM Plex Mono'; font-size:9.5px; letter-spacing:.05em;
  text-transform:uppercase; color:var(--ink-soft); border-bottom:2px solid var(--ink);
  padding:6px 4px;
}
.tb-table th.num{ text-align:right; }
.tb-table td{ padding:5px 4px; vertical-align:top; border-bottom:1px solid var(--rule); line-height:1.4;}
.tb-table td.sno{ font-family:'IBM Plex Mono'; color:var(--balance); font-weight:700; font-size:11px; white-space:nowrap; width:22px;}
.tb-table td.num{ font-family:'IBM Plex Mono'; text-align:right; white-space:nowrap; font-weight:700;}
.tb-table td.num.debit{ color:var(--debit);}
.tb-table td.num.credit{ color:var(--credit);}
.tb-table tr.total td{ border-top:2px solid var(--ink); border-bottom:2px solid var(--ink); font-weight:800; background:var(--balance-bg); font-family:'IBM Plex Mono';}
.tb-table tr.total td.num{ color:var(--ink); }

/* Two-column (Dr list | Cr list) layout for given/corrected raw trial balances */
.twocol-wrap{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;}
.twocol{ border:1.5px solid var(--ink); border-radius:10px; overflow:hidden;}
.twocol-head{ padding:7px 9px; font-family:'Fraunces',serif; font-weight:700; font-size:12.5px; border-bottom:1.5px solid var(--ink);}
.twocol.dr .twocol-head{ background:var(--debit-bg); color:var(--debit);}
.twocol.cr .twocol-head{ background:var(--credit-bg); color:var(--credit);}
.twocol-row{ display:flex; justify-content:space-between; gap:4px; padding:4px 9px; font-size:11px; border-bottom:1px dotted var(--rule);}
.twocol-row:last-of-type{ border-bottom:none;}
.twocol-row .amt{ font-family:'IBM Plex Mono'; font-weight:700; white-space:nowrap;}
.twocol.dr .amt{ color:var(--debit);}
.twocol.cr .amt{ color:var(--credit);}
.twocol-total{ display:flex; justify-content:space-between; padding:5px 9px; font-family:'IBM Plex Mono'; font-weight:800; border-top:2px solid var(--ink); background:var(--paper-2);}

/* Journal table (for Q2) */
.jtable{ width:100%; border-collapse:collapse; font-size:12.5px; }
.jtable th{
  text-align:left; font-family:'IBM Plex Mono'; font-size:10px; letter-spacing:.06em;
  text-transform:uppercase; color:var(--ink-soft); border-bottom:2px solid var(--ink);
  padding:6px 4px;
}
.jtable td{ padding:5px 4px; vertical-align:top; border-bottom:1px solid var(--rule);}
.jtable .je-date{ font-family:'IBM Plex Mono'; font-size:11px; color:var(--ink-soft); white-space:nowrap;}
.jtable .je-part{ line-height:1.45;}
.jtable .je-part .dr-line{ color:var(--debit); font-weight:700;}
.jtable .je-part .cr-line{ padding-left:14px; color:var(--credit); font-weight:600;}
.jtable .je-part .narr{ font-style:italic; color:var(--ink-soft); font-size:11.3px; display:block; margin-top:2px;}
.jtable .num{ font-family:'IBM Plex Mono'; text-align:right; white-space:nowrap; font-weight:600;}
.jtable .num.d{ color:var(--debit);}
.jtable .num.c{ color:var(--credit);}
.jentry-block{ border-bottom:2px solid var(--rule); }
.jentry-block:last-child{ border-bottom:none; }

/* Ledger T-accounts (for Q2) */
.ledger-grid{ display:flex; flex-direction:column; gap:14px;}
.tacc{ border:1.5px solid var(--ink); border-radius:10px; overflow:hidden; background:var(--card);}
.tacc-head{ background:var(--paper-2); padding:8px 12px; font-family:'Fraunces',serif; font-weight:700; font-size:14px; border-bottom:1.5px solid var(--ink);}
.tacc-cols{ display:grid; grid-template-columns:1fr 1fr; position:relative;}
.tacc-cols::after{ content:""; position:absolute; top:0; bottom:0; left:50%; width:0; border-left:1.5px dashed var(--rule);}
.tcol{ padding:8px 8px 10px;}
.tcol-lbl{ font-family:'IBM Plex Mono'; font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; font-weight:700; margin-bottom:5px; display:flex; justify-content:space-between;}
.tcol.dr .tcol-lbl{ color:var(--debit);}
.tcol.cr .tcol-lbl{ color:var(--credit);}
.trow{ display:flex; justify-content:space-between; gap:4px; font-size:11.3px; padding:2.5px 0; line-height:1.3;}
.trow .tdate{ font-family:'IBM Plex Mono'; color:var(--ink-soft); font-size:10px; flex:0 0 auto; width:38px;}
.trow .tpart{ flex:1; padding:0 3px;}
.trow .tamt{ font-family:'IBM Plex Mono'; font-weight:700; white-space:nowrap;}
.tcol.dr .trow .tamt{ color:var(--debit);}
.tcol.cr .trow .tamt{ color:var(--credit);}
.ttotal{ border-top:2px solid var(--ink); margin-top:5px; padding-top:4px; font-weight:800;}

.note-box{
  background:var(--credit-bg); border-left:4px solid var(--credit); border-radius:8px;
  padding:9px 12px; margin-top:10px; font-size:11.8px; line-height:1.5; color:var(--ink);
}
.note-box b{ color:var(--credit); }

footer.site-foot{ text-align:center; color:var(--ink-soft); font-size:11.5px; padding:24px 16px 10px; font-family:'IBM Plex Mono';}
@media (max-width:480px){ .twocol-wrap{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="grid-bg"></div>

<header class="hero">
  <svg class="scale-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v18M7 21h10M5 7h14M5 7L2 13a3 3 0 006 0L5 7zM19 7l-3 6a3 3 0 006 0l-3-6z"/></svg>
  <span class="eyebrow">✎ Accountancy · Class XI</span>
  <h1 class="title">Chapter 10 — <em>Trial Balance</em></h1>
  <p class="hero-sub">12 worked problems turned into tap‑to‑open study cards — every account sorted onto its correct pan of the scale. Debit balances in blue, Credit balances in amber, totals always in balance.</p>
  <div class="hero-row" id="statChips"></div>
</header>

<div class="toolbar">
  <button class="tbtn active" id="expandAllBtn">⤢ Expand all</button>
  <button class="tbtn" id="collapseAllBtn">⤡ Collapse all</button>
  <div class="spacer"></div>
  <button class="tbtn" id="themeBtn">🌙 Dark</button>
</div>

<main id="app"></main>



<script>
function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}

function renderTB(tb){
  const wrap = el('div');
  if(tb.label) wrap.appendChild(el('div','sec-label', tb.label));
  if(tb.asOn) wrap.appendChild(el('div','sec-sub', 'Trial Balance as on ' + tb.asOn));
  const table = el('table','tb-table');
  table.innerHTML = `<thead><tr><th style="width:8%">#</th><th>Account / Particulars</th><th class="num" style="width:24%">Debit (₹)</th><th class="num" style="width:24%">Credit (₹)</th></tr></thead>`;
  const tbody = el('tbody');
  tb.rows.forEach(r=>{
    const [sno, name, debit, credit] = r;
    const tr = el('tr');
    tr.innerHTML = `<td class="sno">${sno||''}</td><td>${name}</td><td class="num debit">${debit||''}</td><td class="num credit">${credit||''}</td>`;
    tbody.appendChild(tr);
  });
  const totalTr = el('tr','total');
  totalTr.innerHTML = `<td></td><td>Total</td><td class="num">${tb.total[0]}</td><td class="num">${tb.total[1]}</td>`;
  tbody.appendChild(totalTr);
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

function renderTwoCol(tc){
  const wrap = el('div');
  if(tc.label) wrap.appendChild(el('div','sec-label', tc.label));
  const outer = el('div','twocol-wrap');
  const dr = el('div','twocol dr');
  dr.innerHTML = `<div class="twocol-head">Debit Balances</div>`;
  tc.debit.forEach(r=> dr.innerHTML += `<div class="twocol-row"><span>${r[0]}</span><span class="amt">${r[1]}</span></div>`);
  dr.innerHTML += `<div class="twocol-total"><span>Total</span><span>${tc.total[0]}</span></div>`;
  const cr = el('div','twocol cr');
  cr.innerHTML = `<div class="twocol-head">Credit Balances</div>`;
  tc.credit.forEach(r=> cr.innerHTML += `<div class="twocol-row"><span>${r[0]}</span><span class="amt">${r[1]}</span></div>`);
  cr.innerHTML += `<div class="twocol-total"><span>Total</span><span>${tc.total[1]}</span></div>`;
  outer.appendChild(dr); outer.appendChild(cr);
  wrap.appendChild(outer);
  return wrap;
}

function renderJournal(entries){
  const wrap = el('div');
  const table = el('table','jtable');
  table.innerHTML = `<thead><tr><th style="width:15%">Date</th><th>Particulars</th><th style="width:22%">Debit (₹)</th><th style="width:22%">Credit (₹)</th></tr></thead>`;
  const tbody = el('tbody');
  entries.forEach(en=>{
    const tr = el('tr','jentry-block');
    let partHtml = '';
    en.lines.forEach(l=>{
      if(l.dr) partHtml += `<span class="dr-line">${l.text}</span><br>`;
      else partHtml += `<span class="cr-line">To ${l.text}</span><br>`;
    });
    if(en.narration) partHtml += `<span class="narr">${en.narration}</span>`;
    let debitCol = en.lines.filter(l=>l.dr).map(l=>l.amt||'').join('<br>');
    let creditCol = en.lines.filter(l=>!l.dr).map(l=>l.amt||'').join('<br>');
    tr.innerHTML = `<td class="je-date">${en.date}</td><td class="je-part">${partHtml}</td><td class="num d">${debitCol}</td><td class="num c">${creditCol}</td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

function renderLedger(accounts){
  const wrap = el('div','ledger-grid');
  accounts.forEach(acc=>{
    const card = el('div','tacc');
    card.innerHTML = `<div class="tacc-head">${acc.name}</div>`;
    const cols = el('div','tacc-cols');
    const drCol = el('div','tcol dr');
    drCol.innerHTML = `<div class="tcol-lbl"><span>Dr.</span><span>₹</span></div>`;
    acc.dr.forEach(r=>{ drCol.innerHTML += `<div class="trow"><span class="tdate">${r[0]}</span><span class="tpart">${r[1]}</span><span class="tamt">${r[2]}</span></div>`;});
    if(acc.drTotal) drCol.innerHTML += `<div class="trow ttotal"><span class="tdate"></span><span class="tpart">Total</span><span class="tamt">${acc.drTotal}</span></div>`;
    const crCol = el('div','tcol cr');
    crCol.innerHTML = `<div class="tcol-lbl"><span>Cr.</span><span>₹</span></div>`;
    acc.cr.forEach(r=>{ crCol.innerHTML += `<div class="trow"><span class="tdate">${r[0]}</span><span class="tpart">${r[1]}</span><span class="tamt">${r[2]}</span></div>`;});
    if(acc.crTotal) crCol.innerHTML += `<div class="trow ttotal"><span class="tdate"></span><span class="tpart">Total</span><span class="tamt">${acc.crTotal}</span></div>`;
    cols.appendChild(drCol); cols.appendChild(crCol);
    card.appendChild(cols);
    wrap.appendChild(card);
  });
  return wrap;
}

function buildQuestionCard(q){
  const card = el('div','qcard');
  const head = el('div','qhead');
  head.innerHTML = `
    <div class="qnum">${q.num}</div>
    <div class="qtitle"><div class="qlabel">Question ${q.num}</div><div class="qsum">${q.summary}</div></div>
    <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>`;
  const body = el('div','qbody');
  const inner = el('div','qbody-inner');

  if(q.given){
    const gb = el('div','given-box');
    gb.innerHTML = `<b>📋 Given</b><br>${q.given}` + (q.givenTx ? `<ul class="given-tx">${q.givenTx.map(t=>`<li><span>${t[0]}</span><span class="amt">₹ ${t[1]}</span></li>`).join('')}</ul>` : '');
    inner.appendChild(gb);
  }

  if(q.givenTwoCol) inner.appendChild(renderTwoCol(q.givenTwoCol));

  const tabsAvail = [];
  if(q.journal) tabsAvail.push('Journal');
  if(q.ledgers) tabsAvail.push('Ledger');
  if(q.trial) tabsAvail.push('Trial Balance');

  if(tabsAvail.length>1){
    const subtabs = el('div','subtabs');
    const panes = el('div');
    tabsAvail.forEach((t,i)=>{
      const b = el('button','stbtn'+(i===0?' active':''), t);
      b.onclick = ()=>{
        subtabs.querySelectorAll('.stbtn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        panes.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
        panes.querySelector(`[data-pane="${t}"]`).classList.add('active');
      };
      subtabs.appendChild(b);
    });
    inner.appendChild(subtabs);
    if(q.journal){ const p=el('div','pane active'); p.dataset.pane='Journal'; p.appendChild(renderJournal(q.journal)); panes.appendChild(p); }
    if(q.ledgers){ const p=el('div','pane'); p.dataset.pane='Ledger'; p.appendChild(renderLedger(q.ledgers)); panes.appendChild(p); }
    if(q.trial){ const p=el('div','pane'); p.dataset.pane='Trial Balance'; p.appendChild(renderTB(q.trial)); panes.appendChild(p); }
    inner.appendChild(panes);
  } else if(q.trial){
    inner.appendChild(renderTB(q.trial));
  }

  if(q.correctedTwoCol) inner.appendChild(renderTwoCol(q.correctedTwoCol));

  if(q.note){
    const nb = el('div','note-box');
    nb.innerHTML = `<b>Note:</b> ${q.note}`;
    inner.appendChild(nb);
  }

  body.appendChild(inner);

  head.onclick = ()=>{
    const isOpen = card.classList.toggle('open');
    body.style.maxHeight = isOpen ? body.scrollHeight+'px' : '0px';
  };
  card.appendChild(head);
  card.appendChild(body);
  return card;
}

function init(){
  const app = document.getElementById('app');
  QUESTIONS.forEach(q=> app.appendChild(buildQuestionCard(q)));

  const chips = document.getElementById('statChips');
  [['12','Questions'],['3','With GST'],['4','Correction cases'],['100%','Content match']].forEach(s=>{
    chips.innerHTML += `<div class="stat-chip"><div class="num">${s[0]}</div><div class="lbl">${s[1]}</div></div>`;
  });

  document.getElementById('expandAllBtn').onclick = ()=>{
    document.querySelectorAll('.qcard').forEach(c=>{
      c.classList.add('open');
      const b = c.querySelector('.qbody');
      b.style.maxHeight = b.scrollHeight+'px';
    });
  };
  document.getElementById('collapseAllBtn').onclick = ()=>{
    document.querySelectorAll('.qcard').forEach(c=>{
      c.classList.remove('open');
      c.querySelector('.qbody').style.maxHeight = '0px';
    });
  };
  const themeBtn = document.getElementById('themeBtn');
  themeBtn.onclick = ()=>{
    const d = document.documentElement;
    if(d.getAttribute('data-theme')==='dark'){ d.removeAttribute('data-theme'); themeBtn.innerHTML='🌙 Dark';}
    else { d.setAttribute('data-theme','dark'); themeBtn.innerHTML='☀️ Light';}
  };

  window.addEventListener('load', ()=>{
