<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Chapter 6 · Ledger — Visual Study Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --paper:#F7F3E9;
  --paper-2:#EFE8D6;
  --ink:#1C2541;
  --ink-soft:#4A5578;
  --rule:#C9BFA0;
  --debit:#0E6F5C;
  --debit-bg:#E3F1EA;
  --credit:#8B2635;
  --credit-bg:#F6E4E4;
  --gold:#B8860B;
  --gold-bg:#FBF0D6;
  --card:#FFFDF7;
  --shadow: 0 2px 0 rgba(28,37,65,.08), 0 8px 24px -12px rgba(28,37,65,.25);
  --radius: 14px;
}
[data-theme="dark"]{
  --paper:#151A2E;
  --paper-2:#1C233D;
  --ink:#F1EEE2;
  --ink-soft:#B7BCD6;
  --rule:#3A4266;
  --debit:#5FD9B4;
  --debit-bg:#173730;
  --credit:#F3919B;
  --credit-bg:#3A1C22;
  --gold:#E8C46A;
  --gold-bg:#332705;
  --card:#1E2540;
  --shadow: 0 2px 0 rgba(0,0,0,.3), 0 10px 28px -12px rgba(0,0,0,.6);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    linear-gradient(var(--paper),var(--paper));
  background-color:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  padding-bottom:80px;
  transition:background-color .3s, color .3s;
}
.ledger-lines{
  background-image: repeating-linear-gradient(to bottom, transparent, transparent 27px, var(--rule) 28px);
  opacity:.35;
  position:fixed; inset:0; pointer-events:none; z-index:0;
}

/* ---------- HERO ---------- */
header.hero{
  position:relative;
  padding:34px 18px 26px;
  background:
    radial-gradient(120% 140% at 100% 0%, rgba(184,134,11,.16), transparent 55%),
    var(--paper-2);
  border-bottom:3px double var(--rule);
  overflow:hidden;
}
.eyebrow{
  display:inline-flex; align-items:center; gap:6px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--gold); font-weight:600;
  background:var(--gold-bg); padding:4px 10px; border-radius:20px;
  border:1px solid var(--gold);
}
h1.title{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:clamp(28px,8vw,42px);
  line-height:1.02;
  margin:10px 0 6px;
  letter-spacing:-.01em;
}
h1.title em{ color:var(--debit); font-style:normal; border-bottom:4px solid var(--debit); }
.hero-sub{ color:var(--ink-soft); font-size:14.5px; max-width:520px; line-height:1.5; margin:0 0 16px;}
.hero-ledgerbook{
  display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none;
}
.hero-ledgerbook::-webkit-scrollbar{display:none;}
.stat-chip{
  flex:0 0 auto;
  background:var(--card); border:1px solid var(--rule); border-radius:12px;
  padding:10px 14px; box-shadow:var(--shadow); min-width:96px; text-align:center;
}
.stat-chip .num{ font-family:'Fraunces',serif; font-size:22px; font-weight:700; color:var(--ink);}
.stat-chip .lbl{ font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); font-weight:600;}

.toolbar{
  position:sticky; top:0; z-index:20;
  display:flex; gap:8px; padding:10px 14px;
  background:color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--rule);
}
.tbtn{
  border:1px solid var(--rule); background:var(--card); color:var(--ink);
  font-family:'Inter'; font-weight:600; font-size:12.5px;
  padding:8px 12px; border-radius:20px; cursor:pointer; display:flex; align-items:center; gap:6px;
}
.tbtn.active{ background:var(--ink); color:var(--paper); border-color:var(--ink);}
.tbtn:active{ transform:scale(.97); }
.spacer{flex:1;}

main{ max-width:760px; margin:0 auto; padding:16px 12px 40px; position:relative; z-index:1;}

/* ---------- QUESTION CARD ---------- */
.qcard{
  background:var(--card);
  border:1px solid var(--rule);
  border-radius:var(--radius);
  margin-bottom:16px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.qhead{
  display:flex; align-items:center; gap:12px;
  padding:14px 16px; cursor:pointer; user-select:none;
  position:relative;
}
.qnum{
  font-family:'Fraunces',serif; font-weight:700; font-size:20px;
  width:40px; height:40px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  background:var(--ink); color:var(--paper); flex:0 0 auto;
}
.qhead .qtitle{ flex:1; }
.qhead .qtitle .qlabel{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); font-weight:700;}
.qhead .qtitle .qsum{ font-size:14.5px; font-weight:600; color:var(--ink); line-height:1.35; margin-top:2px;}
.chev{ transition:transform .25s; color:var(--ink-soft); flex:0 0 auto;}
.qcard.open .chev{ transform:rotate(180deg);}
.qbody{ max-height:0; overflow:hidden; transition:max-height .35s ease;}
.qbody-inner{ padding:0 16px 18px; border-top:1px dashed var(--rule); }

.given-box{
  background:var(--paper-2); border-radius:10px; padding:12px 14px; margin:14px 0;
  font-size:13.3px; line-height:1.6; color:var(--ink-soft);
  border-left:4px solid var(--gold);
}
.given-box b{ color:var(--ink); }
.given-tx{ list-style:none; margin:8px 0 0; padding:0; }
.given-tx li{ display:flex; justify-content:space-between; gap:10px; padding:4px 0; border-bottom:1px dotted var(--rule); font-family:'IBM Plex Mono',monospace; font-size:12px;}
.given-tx li:last-child{border-bottom:none;}
.given-tx .amt{ color:var(--ink); font-weight:700; white-space:nowrap;}

.subtabs{ display:flex; gap:6px; margin:14px 0 10px; flex-wrap:wrap;}
.stbtn{
  border:1px solid var(--rule); background:transparent; color:var(--ink-soft);
  font-size:12px; font-weight:700; padding:6px 12px; border-radius:8px; cursor:pointer;
  font-family:'Inter';
}
.stbtn.active{ background:var(--debit); border-color:var(--debit); color:#fff;}
.pane{ display:none; }
.pane.active{ display:block; }

/* Journal table */
.jtable{ width:100%; border-collapse:collapse; font-size:12.5px; }
.jtable th{
  text-align:left; font-family:'IBM Plex Mono'; font-size:10px; letter-spacing:.06em;
  text-transform:uppercase; color:var(--ink-soft); border-bottom:2px solid var(--ink);
  padding:6px 4px;
}
.jtable td{ padding:5px 4px; vertical-align:top; border-bottom:1px solid var(--rule);}
.jtable .je-date{ font-family:'IBM Plex Mono'; font-size:11px; color:var(--ink-soft); white-space:nowrap;}
.jtable .je-part{ line-height:1.45;}
.jtable .je-part .dr-line{ color:var(--debit); font-weight:700;}
.jtable .je-part .cr-line{ padding-left:14px; color:var(--credit); font-weight:600;}
.jtable .je-part .narr{ font-style:italic; color:var(--ink-soft); font-size:11.3px; display:block; margin-top:2px;}
.jtable .num{ font-family:'IBM Plex Mono'; text-align:right; white-space:nowrap; font-weight:600;}
.jtable .num.d{ color:var(--debit);}
.jtable .num.c{ color:var(--credit);}
.jentry-block{ border-bottom:2px solid var(--rule); }
.jentry-block:last-child{ border-bottom:none; }

/* Ledger T-accounts */
.ledger-grid{ display:flex; flex-direction:column; gap:14px;}
.tacc{
  border:1.5px solid var(--ink); border-radius:10px; overflow:hidden;
  background:var(--card);
}
.tacc-head{
  background:var(--paper-2); padding:8px 12px; font-family:'Fraunces',serif; font-weight:700;
  font-size:14.5px; display:flex; align-items:center; gap:8px; border-bottom:1.5px solid var(--ink);
}
.tacc-head .ic{ width:22px; height:22px; flex:0 0 auto;}
.tacc-cols{ display:grid; grid-template-columns:1fr 1fr; position:relative;}
.tacc-cols::after{
  content:""; position:absolute; top:0; bottom:0; left:50%; width:0;
  border-left:1.5px dashed var(--rule);
}
.tcol{ padding:8px 8px 10px;}
.tcol-lbl{
  font-family:'IBM Plex Mono'; font-size:9.5px; text-transform:uppercase; letter-spacing:.08em;
  font-weight:700; margin-bottom:5px; display:flex; justify-content:space-between;
}
.tcol.dr .tcol-lbl{ color:var(--debit);}
.tcol.cr .tcol-lbl{ color:var(--credit);}
.trow{ display:flex; justify-content:space-between; gap:4px; font-size:11.3px; padding:2.5px 0; line-height:1.3;}
.trow .tdate{ font-family:'IBM Plex Mono'; color:var(--ink-soft); font-size:10px; flex:0 0 auto; width:38px;}
.trow .tpart{ flex:1; padding:0 3px;}
.trow .tamt{ font-family:'IBM Plex Mono'; font-weight:700; white-space:nowrap;}
.tcol.dr .trow .tamt{ color:var(--debit);}
.tcol.cr .trow .tamt{ color:var(--credit);}
.ttotal{ border-top:2px solid var(--ink); margin-top:5px; padding-top:4px; font-weight:800;}
.tbd{ font-size:10.5px; color:var(--gold); font-style:italic; margin-top:3px;}

/* Trial balance */
.tb-table{ width:100%; border-collapse:collapse; font-size:12px; margin-top:8px;}
.tb-table th{ background:var(--ink); color:var(--paper); padding:6px 6px; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em;}
.tb-table td{ padding:5px 6px; border-bottom:1px solid var(--rule);}
.tb-table td.num{ font-family:'IBM Plex Mono'; text-align:right; font-weight:600;}
.tb-table tr.total td{ font-weight:800; border-top:2px solid var(--ink); background:var(--gold-bg);}

.badge-gst{ display:inline-block; font-size:9.5px; font-family:'IBM Plex Mono'; background:var(--credit-bg); color:var(--credit); padding:1px 6px; border-radius:8px; margin-left:6px; font-weight:700;}

footer.site-foot{ text-align:center; color:var(--ink-soft); font-size:11.5px; padding:24px 16px 10px; font-family:'IBM Plex Mono';}

@media (min-width:640px){
  .trow .tdate{ width:46px; }
}
</style>
</head>
<body>
<div class="ledger-lines"></div>

<header class="hero">
  <span class="eyebrow">✎ Accountancy · Class XI</span>
  <h1 class="title">Chapter 6 — <em>Ledger</em></h1>
  <p class="hero-sub">11 fully worked problems — Journal entries, Ledger T‑accounts &amp; Trial Balance — turned into tap‑to‑open visual study cards. Every figure below matches the original solutions exactly.</p>
  <div class="hero-ledgerbook" id="statChips"></div>
</header>

<div class="toolbar">
  <button class="tbtn active" id="expandAllBtn">⤢ Expand all</button>
  <button class="tbtn" id="collapseAllBtn">⤡ Collapse all</button>
  <div class="spacer"></div>
  <button class="tbtn" id="themeBtn">🌙 Dark</button>
</div>

<main id="app"></main>



<script>
const ICONS = {
  cash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/></svg>',
  bank: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10l9-6 9 6"/><path d="M4 10v9M9 10v9M15 10v9M20 10v9"/><path d="M2 21h20"/></svg>',
  person: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>',
  goods: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>',
  capital: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
  gst: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M9 9h6v6H9z"/></svg>',
  book: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4.5A2.5 2.5 0 016.5 2H20v18H6.5A2.5 2.5 0 004 17.5v-13z"/><path d="M4 17.5A2.5 2.5 0 016.5 15H20"/></svg>',
  misc: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>'
};
function iconFor(name){
  const n = name.toLowerCase();
  if(n.includes('cash')) return ICONS.cash;
  if(n.includes('bank')) return ICONS.bank;
  if(n.includes('purchase')||n.includes('sales')||n.includes('stock')||n.includes('goods')) return ICONS.goods;
  if(n.includes('capital')||n.includes('drawing')) return ICONS.capital;
  if(n.includes('gst')) return ICONS.gst;
  if(n.includes('account') && (n.includes('total')||n.includes('trial'))) return ICONS.book;
  if(/^[a-z .&]+$/.test(n) && !n.includes('a/c')) return ICONS.person;
  return ICONS.misc;
}

function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}

function renderJournal(entries){
  const wrap = el('div');
  const table = el('table','jtable');
  table.innerHTML = `<thead><tr><th style="width:15%">Date</th><th>Particulars</th><th style="width:22%">Debit (₹)</th><th style="width:22%">Credit (₹)</th></tr></thead>`;
  const tbody = el('tbody');
  entries.forEach(en=>{
    const tr = el('tr','jentry-block');
    let partHtml = '';
    en.lines.forEach(l=>{
      if(l.dr) partHtml += `<span class="dr-line">${l.text} ${l.gst?('<span class="badge-gst">'+l.gst+'</span>'):''}</span><br>`;
      else partHtml += `<span class="cr-line">To ${l.text}</span><br>`;
    });
    if(en.narration) partHtml += `<span class="narr">${en.narration}${en.gst?(' <span class="badge-gst">'+en.gst+'</span>'):''}</span>`;
    let debitCol = en.lines.filter(l=>l.dr).map(l=>l.amt||'').join('<br>');
    let creditCol = en.lines.filter(l=>!l.dr).map(l=>l.amt||'').join('<br>');
    tr.innerHTML = `<td class="je-date">${en.date}</td><td class="je-part">${partHtml}</td><td class="num d">${debitCol}</td><td class="num c">${creditCol}</td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

function renderLedger(accounts){
  const wrap = el('div','ledger-grid');
  accounts.forEach(acc=>{
    const card = el('div','tacc');
    card.innerHTML = `<div class="tacc-head"><span class="ic">${iconFor(acc.name)}</span>${acc.name}</div>`;
    const cols = el('div','tacc-cols');
    const drCol = el('div','tcol dr');
    drCol.innerHTML = `<div class="tcol-lbl"><span>Dr.</span><span>₹</span></div>`;
    acc.dr.forEach(r=>{ drCol.innerHTML += `<div class="trow"><span class="tdate">${r[0]}</span><span class="tpart">${r[1]}</span><span class="tamt">${r[2]}</span></div>`;});
    if(acc.drTotal) drCol.innerHTML += `<div class="trow ttotal"><span class="tdate"></span><span class="tpart">Total</span><span class="tamt">${acc.drTotal}</span></div>`;
    if(acc.drBd) drCol.innerHTML += `<div class="tbd">${acc.drBd}</div>`;
    const crCol = el('div','tcol cr');
    crCol.innerHTML = `<div class="tcol-lbl"><span>Cr.</span><span>₹</span></div>`;
    acc.cr.forEach(r=>{ crCol.innerHTML += `<div class="trow"><span class="tdate">${r[0]}</span><span class="tpart">${r[1]}</span><span class="tamt">${r[2]}</span></div>`;});
    if(acc.crTotal) crCol.innerHTML += `<div class="trow ttotal"><span class="tdate"></span><span class="tpart">Total</span><span class="tamt">${acc.crTotal}</span></div>`;
    if(acc.crBd) crCol.innerHTML += `<div class="tbd">${acc.crBd}</div>`;
    cols.appendChild(drCol); cols.appendChild(crCol);
    card.appendChild(cols);
    wrap.appendChild(card);
  });
  return wrap;
}

function renderTrial(tb){
  const wrap = el('div');
  wrap.innerHTML = `<p style="font-size:12.5px;color:var(--ink-soft);margin:10px 0 0;">Trial Balance as on ${tb.asOn}</p>`;
  const table = el('table','tb-table');
  table.innerHTML = `<thead><tr><th>#</th><th>Particulars</th><th>Debit ₹</th><th>Credit ₹</th></tr></thead>`;
  const tbody = el('tbody');
  tb.rows.forEach((r,i)=>{
    tbody.innerHTML += `<tr><td>${i+1}</td><td>${r[0]}</td><td class="num">${r[1]||''}</td><td class="num">${r[2]||''}</td></tr>`;
  });
  tbody.innerHTML += `<tr class="total"><td></td><td>Total</td><td class="num">${tb.total[0]}</td><td class="num">${tb.total[1]}</td></tr>`;
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

function buildQuestionCard(q, idx){
  const card = el('div','qcard');
  const head = el('div','qhead');
  head.innerHTML = `
    <div class="qnum">${q.num}</div>
    <div class="qtitle"><div class="qlabel">Question ${q.num}${q.place?(' · '+q.place):''}</div><div class="qsum">${q.summary}</div></div>
    <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>`;
  const body = el('div','qbody');
  const inner = el('div','qbody-inner');

  if(q.given){
    const gb = el('div','given-box');
    gb.innerHTML = `<b>📋 Given</b><br>${q.given}` + (q.givenTx ? `<ul class="given-tx">${q.givenTx.map(t=>`<li><span>${t[0]}</span><span class="amt">₹ ${t[1]}</span></li>`).join('')}</ul>` : '');
    inner.appendChild(gb);
  }

  const tabsAvail = [];
  if(q.journal) tabsAvail.push('Journal');
  if(q.ledgers) tabsAvail.push('Ledger');
  if(q.trial) tabsAvail.push('Trial Balance');

  const subtabs = el('div','subtabs');
  const panes = el('div');
  tabsAvail.forEach((t,i)=>{
    const b = el('button','stbtn'+(i===0?' active':''), t);
    b.onclick = ()=>{
      subtabs.querySelectorAll('.stbtn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      panes.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
      panes.querySelector(`[data-pane="${t}"]`).classList.add('active');
    };
    subtabs.appendChild(b);
  });
  inner.appendChild(subtabs);

  if(q.journal){
    const p = el('div','pane active'); p.dataset.pane='Journal';
    p.appendChild(renderJournal(q.journal));
    panes.appendChild(p);
  }
  if(q.ledgers){
    const p = el('div','pane'+(!q.journal?' active':'')); p.dataset.pane='Ledger';
    p.appendChild(renderLedger(q.ledgers));
    panes.appendChild(p);
  }
  if(q.trial){
    const p = el('div','pane'); p.dataset.pane='Trial Balance';
    p.appendChild(renderTrial(q.trial));
    panes.appendChild(p);
  }
  inner.appendChild(panes);
  body.appendChild(inner);

  head.onclick = ()=>{
    const isOpen = card.classList.toggle('open');
    body.style.maxHeight = isOpen ? body.scrollHeight+'px' : '0px';
  };
  card.appendChild(head);
  card.appendChild(body);
  return card;
}

function init(){
  const app = document.getElementById('app');
  QUESTIONS.forEach((q,i)=> app.appendChild(buildQuestionCard(q,i)));

  const chips = document.getElementById('statChips');
  const totalLedgers = QUESTIONS.reduce((a,q)=>a+(q.ledgers?q.ledgers.length:0),0);
  [['11','Questions'],[totalLedgers+'','Ledger A/cs'],['4','With GST'],['100%','Content match']].forEach(s=>{
    chips.innerHTML += `<div class="stat-chip"><div class="num">${s[0]}</div><div class="lbl">${s[1]}</div></div>`;
  });

  document.getElementById('expandAllBtn').onclick = ()=>{
    document.querySelectorAll('.qcard').forEach(c=>{
      c.classList.add('open');
      const b = c.querySelector('.qbody');
      b.style.maxHeight = b.scrollHeight+'px';
    });
  };
  document.getElementById('collapseAllBtn').onclick = ()=>{
    document.querySelectorAll('.qcard').forEach(c=>{
      c.classList.remove('open');
      c.querySelector('.qbody').style.maxHeight = '0px';
    });
  };
  const themeBtn = document.getElementById('themeBtn');
  themeBtn.onclick = ()=>{
    const d = document.documentElement;
    if(d.getAttribute('data-theme')==='dark'){ d.removeAttribute('data-theme'); themeBtn.innerHTML='🌙 Dark';}
    else { d.setAttribute('data-theme','dark'); themeBtn.innerHTML='☀️ Light';}
  };

  // recompute open heights on resize (font load reflow)
  window.addEventListener('load', ()=>{
    document.querySelectorAll('.qcard.open .qbody').forEach(b=> b.style.maxHeight = b.scrollHeight+'px');
  });
}
</script>
<script>
// Data transcribed exactly from the source solutions (Chapter 6 - Ledger)
const QUESTIONS = [];

/* ================= QUESTION 1 ================= */
QUESTIONS.push({
  num:1, place:"Mohit, Delhi",
  summary:"Mohit starts business with ₹50,000 capital; trades goods on credit with Rita (supplier) and Rohit (customer) through April.",
  given:"On 1st April, 2019, Mohit, Delhi started business with a capital of ₹50,000.",
  givenTx:[
    ["Apr 3 — Purchased goods from Rita, Delhi on credit","20,000"],
    ["Apr 4 — Cash paid to Rita","10,000"],
